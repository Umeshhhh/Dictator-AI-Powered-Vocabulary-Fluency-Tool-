services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: dictator-app:latest
    expose:
      - "3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: "postgresql://user:password@postgres:5432/dictator?schema=public"
      REDIS_URL: "redis://redis:6379"
      NEXTAUTH_URL: "https://dictator.umesh.app"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      NEXT_GITHUB_TOKEN: "${NEXT_GITHUB_TOKEN:-}"
      CRON_SECRET: "${CRON_SECRET:?CRON_SECRET is required}"
      GITHUB_ID: "${GITHUB_ID:-}"
      GITHUB_SECRET: "${GITHUB_SECRET:-}"
      GOOGLE_ID: "${GOOGLE_ID:-}"
      GOOGLE_SECRET: "${GOOGLE_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    init: true
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 45s

  proxy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: dictator
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d dictator"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:
