services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: dictator-app-prod
    container_name: dictator-app-prod
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: "0.0.0.0"
      PORT: "3000"
      DATABASE_URL: "postgresql://${POSTGRES_USER:-dictator}:${POSTGRES_PASSWORD:-dictator-internal}@postgres:5432/${POSTGRES_DB:-dictator}?schema=public"
      REDIS_URL: "redis://redis:6379"
      NEXTAUTH_URL: "${NEXTAUTH_URL:-}"
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET:-}"
      NEXT_GITHUB_TOKEN: "${NEXT_GITHUB_TOKEN:-}"
      GITHUB_ID: "${GITHUB_ID:-}"
      GITHUB_SECRET: "${GITHUB_SECRET:-}"
      GOOGLE_ID: "${GOOGLE_ID:-}"
      GOOGLE_SECRET: "${GOOGLE_SECRET:-}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  postgres:
    image: postgres:15-alpine
    container_name: dictator-postgres-prod
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-dictator}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-dictator-internal}"
      POSTGRES_DB: "${POSTGRES_DB:-dictator}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dictator} -d ${POSTGRES_DB:-dictator}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: dictator-redis-prod
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
  redis_data:
